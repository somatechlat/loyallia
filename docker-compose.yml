# =============================================================================
# LOYALLIA — Full Docker Compose Stack (Production-Grade for Localhost)
# All services open source — PostgreSQL + Redis + MinIO + Django + Next.js
# PORT RANGE: 33900+ (see docs/PORT_AUTHORITY.md)
# TOTAL CLUSTER LIMIT: 10GB RAM
# ACTUAL BUDGET: ~8.9GB allocated (headroom for OS/Docker daemon)
#
# MEMORY ALLOCATION:
#   postgres=1.5G | redis=512M | minio=512M | pgbouncer=128M
#   api=2G | web=2G | celery-pass/push/default=384Mx3 | celery-beat=192M
#   flower=192M | vault=256M | init containers=64Mx2 (ephemeral)
#
# SECRETS: All credentials pulled from .env (gitignored).
# See .env.example for the full list of required variables.
# =============================================================================

x-common-env: &common-env
  DATABASE_URL: postgres://${POSTGRES_USER:-loyallia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-loyallia}
  DATABASE_DIRECT_URL: postgres://${POSTGRES_USER:-loyallia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-loyallia}
  # PgBouncer available at pgbouncer:6432 for connection pooling in production
  PGBOUNCER_URL: postgres://${POSTGRES_USER:-loyallia}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB:-loyallia}
  REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_BUCKET_PASSES: passes
  MINIO_BUCKET_ASSETS: assets
  SECRET_KEY: ${SECRET_KEY}
  DJANGO_SETTINGS_MODULE: loyallia.settings.development
  DEBUG: "${DEBUG:-False}"
  ALLOWED_HOSTS: "${ALLOWED_HOSTS:-rewards.loyallia.com,localhost,127.0.0.1}"
  CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-http://localhost:33906,http://localhost:33905}"
  # Vault
  VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
  VAULT_TOKEN: ${VAULT_TOKEN:-}
  VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-secret/data/loyallia}
  # Apple Wallet
  APPLE_PASS_TYPE_IDENTIFIER: ${APPLE_PASS_TYPE_IDENTIFIER:-pass.com.loyallia.cards}
  APPLE_TEAM_IDENTIFIER: ${APPLE_TEAM_IDENTIFIER:-}
  APPLE_CERT_PATH: /app/certs/apple_pass.pem
  APPLE_CERT_KEY_PATH: /app/certs/apple_pass.key
  APPLE_WWDR_CERT_PATH: /app/certs/apple_wwdr.pem
  # Google Wallet
  GOOGLE_SERVICE_ACCOUNT_FILE: /app/certs/google_wallet_service_account.json
  GOOGLE_WALLET_ISSUER_ID: ${GOOGLE_WALLET_ISSUER_ID:-}
  # Payment Gateway (Bendo/PlacetoPay) — secrets from .env
  PAYMENT_GATEWAY_PROVIDER: ${PAYMENT_GATEWAY_PROVIDER:-bendo}
  PAYMENT_GATEWAY_BASE_URL: ${PAYMENT_GATEWAY_BASE_URL:-https://checkout.placetopay.com}
  PAYMENT_GATEWAY_LOGIN: ${PAYMENT_GATEWAY_LOGIN:-}
  PAYMENT_GATEWAY_TRAN_KEY: ${PAYMENT_GATEWAY_TRAN_KEY:-}
  PAYMENT_GATEWAY_WEBHOOK_SECRET: ${PAYMENT_GATEWAY_WEBHOOK_SECRET:-}
  # Email — secrets from .env
  EMAIL_HOST: ${EMAIL_HOST:-smtp.mailjet.com}
  EMAIL_PORT: "${EMAIL_PORT:-587}"
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_FROM: ${EMAIL_FROM:-noreply@loyallia.com}
  # Firebase (Android push)
  FIREBASE_CREDENTIAL_FILE: /app/certs/firebase_service_account.json
  # Google OAuth 2.0 (Social Login)
  GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
  GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
  GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:33905/api/v1/auth/google/callback/}
  # JWT secret (separate from Django SECRET_KEY — B-001)
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-}
  # Sentry error tracking (B-013)
  SENTRY_DSN: ${SENTRY_DSN:-}

services:
  # ---------------------------------------------------------------------------
  # POSTGRESQL 16 — Primary Database  → localhost:33900              [1.5GB]
  # Production: WAL archiving, tuned memory, persistent volume
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16.2-alpine
    container_name: loyallia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loyallia}
      POSTGRES_USER: ${POSTGRES_USER:-loyallia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Production-grade PostgreSQL tuning
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=384MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=cp %p /var/lib/postgresql/data/wal_archive/%f"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_wal_archive:/var/lib/postgresql/data/wal_archive
    ports:
      - "127.0.0.1:33900:5432"
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyallia -d loyallia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # POSTGRESQL REPLICA — Streaming Replication (LYL-H-INFRA-015)
  # Hot standby for read scaling and failover
  # ---------------------------------------------------------------------------
  postgres-replica:
    image: postgres:16.2-alpine
    container_name: loyallia-postgres-replica
    environment:
      PGUSER: ${POSTGRES_USER:-loyallia}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      bash -c "
      if [ ! -f /var/lib/postgresql/data/PG_VERSION ]; then
        until pg_basebackup --pgdata=/var/lib/postgresql/data --host=postgres --port=5432 --username=${POSTGRES_USER:-loyallia} --wal-method=stream --checkpoint=fast --progress --verbose 2>&1; do
          echo 'Waiting for primary to accept connections...'
          sleep 5
        done &&
        chmod 0700 /var/lib/postgresql/data &&
        cat > /var/lib/postgresql/data/postgresql.auto.conf <<EOF
primary_conninfo = 'host=postgres port=5432 user=${POSTGRES_USER:-loyallia} password=${POSTGRES_PASSWORD}'
hot_standby = on
EOF
        touch /var/lib/postgresql/data/standby.signal
      fi &&
      exec postgres -c hot_standby=on -c max_connections=100 -c shared_buffers=256MB -c work_mem=8MB
      "
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:33911:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loyallia -d loyallia"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # PGBOUNCER — Connection Pooling      → localhost:33901            [128M]
  # Transaction pooling for millions of concurrent connections
  # ---------------------------------------------------------------------------
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    container_name: loyallia-pgbouncer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-loyallia}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-loyallia}
      LISTEN_PORT: "6432"
      AUTH_TYPE: "scram-sha-256"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "80"
      MIN_POOL_SIZE: "20"
      RESERVE_POOL_SIZE: "20"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_IDLE_TIMEOUT: "300"
      SERVER_LIFETIME: "1800"
      LOG_CONNECTIONS: "1"
      LOG_DISCONNECTIONS: "1"
    ports:
      - "127.0.0.1:33901:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # LYL-M-INFRA-019: PgBouncer healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U loyallia"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
        reservations:
          memory: 32M

  # ---------------------------------------------------------------------------
  # REDIS 7 — Cache + Celery Broker     → localhost:33902            [512M]
  # AOF persistence, LRU eviction, production limits
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2.4-alpine
    container_name: loyallia-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 400mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 300
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:33902:6379"
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MINIO — S3-Compatible Object Storage → localhost:33903-33904     [512M]
  # Persistent volume for passes, assets (Apple/Google Wallet PKPasses)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-03-05T04-48-36Z
    container_name: loyallia-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:33903:9000"
      - "127.0.0.1:33904:9001"
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO bucket initialization
  minio-init:
    image: minio/mc:RELEASE.2024-03-05T04-48-36Z
    container_name: loyallia-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/passes &&
      mc mb --ignore-existing local/assets &&
      mc anonymous set download local/assets &&
      echo 'MinIO buckets ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # DJANGO API — Django 5 + Django Ninja → localhost:33905           [2GB]
  # Production-grade: migrate, collectstatic, seed plans, Gunicorn-ready
  # Live reload via volume mount for dev; switch to gunicorn for prod
  # ---------------------------------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyallia-api
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      python manage.py seed_subscription_plans 2>/dev/null || true &&
      python manage.py seed_test_data 2>/dev/null || true &&
      python manage.py runserver 0.0.0.0:8000"
    environment:
      <<: *common-env
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
      - ./certs:/app/certs:ro
    ports:
      - "127.0.0.1:33905:8000"
    stop_grace_period: 30s  # B-012: Graceful shutdown for in-flight requests
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening (read_only omitted — dev volume mounts need write)
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "2.0"
        reservations:
          memory: 768M
      # LYL-H-INFRA-014: Rolling deployment
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
        monitor: 60s
        max_failure_ratio: 0.2
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # NEXT.JS — Dashboard + Scanner PWA   → localhost:33906           [2GB]
  # Production-grade: optimized build, persistent .next cache
  # ---------------------------------------------------------------------------
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loyallia-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:33905}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:33906}
      NEXT_INTERNAL_API_URL: ${NEXT_INTERNAL_API_URL:-http://api:8000}
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      HOST: "0.0.0.0"
    ports:
      - "127.0.0.1:33906:3000"
    stop_grace_period: 30s  # B-012: Graceful shutdown
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/next.config.js:/app/next.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/tests:/app/tests:ro
      - ./frontend/playwright.config.ts:/app/playwright.config.ts:ro
      - next_cache:/app/.next/cache
    depends_on:
      - api
    networks:
      - frontend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: "1.5"
        reservations:
          memory: 512M
      # LYL-H-INFRA-014: Rolling deployment
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: start-first

  # ---------------------------------------------------------------------------
  # CELERY WORKERS — Async Task Processing                         [1.2GB total]
  # max-tasks-per-child prevents memory leaks in long-running workers
  # ---------------------------------------------------------------------------

  # Worker 1: Pass generation (high priority)                      [384M]
  celery-pass:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyallia-celery-pass
    command: celery -A loyallia worker -Q pass_generation -c 2 -l info --max-tasks-per-child=500
    environment:
      <<: *common-env
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro
    stop_grace_period: 30s  # B-012: Graceful shutdown for in-flight tasks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # LYL-M-INFRA-020: Celery worker healthcheck
    healthcheck:
      test: ["CMD-SHELL", "celery -A loyallia inspect ping --timeout 10 2>&1 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M
      # LYL-H-INFRA-014: Rolling deployment
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # Worker 2: Push notification delivery                           [384M]
  celery-push:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyallia-celery-push
    command: celery -A loyallia worker -Q push_delivery -c 2 -l info --max-tasks-per-child=500
    environment:
      <<: *common-env
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro
    stop_grace_period: 30s  # B-012: Graceful shutdown
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # LYL-M-INFRA-020: Celery worker healthcheck
    healthcheck:
      test: ["CMD-SHELL", "celery -A loyallia inspect ping --timeout 10 2>&1 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M
      # LYL-H-INFRA-014: Rolling deployment
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # Worker 3: Default queue (email, billing, automation)           [384M]
  celery-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyallia-celery-default
    command: celery -A loyallia worker -Q default,email,billing -c 2 -l info --max-tasks-per-child=500
    environment:
      <<: *common-env
    volumes:
      - ./backend:/app
      - ./certs:/app/certs:ro
    stop_grace_period: 30s  # B-012: Graceful shutdown
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # LYL-M-INFRA-020: Celery worker healthcheck
    healthcheck:
      test: ["CMD-SHELL", "celery -A loyallia inspect ping --timeout 10 2>&1 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M
      # LYL-H-INFRA-014: Rolling deployment
      update_config:
        parallelism: 1
        delay: 30s
        order: start-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # ---------------------------------------------------------------------------
  # CELERY BEAT — Scheduled Jobs Scheduler                         [128M]
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyallia-celery-beat
    command: celery -A loyallia beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      <<: *common-env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"
        reservations:
          memory: 96M

  # ---------------------------------------------------------------------------
  # FLOWER — Celery Worker Monitor       → localhost:33907          [128M]
  # ---------------------------------------------------------------------------
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loyallia-flower
    command: celery -A loyallia flower --port=5555 --basic_auth=${FLOWER_BASIC_AUTH}
    environment:
      <<: *common-env
    ports:
      - "127.0.0.1:33907:5555"
    depends_on:
      - redis
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 192M
          cpus: "0.25"

  # ---------------------------------------------------------------------------
  # HASHICORP VAULT — Secret Management   → localhost:33908           [256M]
  # ---------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.15.6
    container_name: loyallia-vault
    command: vault server -config=/vault/config/vault.hcl
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_ADDR: http://0.0.0.0:8200
    volumes:
      - ./deploy/vault.hcl:/vault/config/vault.hcl:ro
      - vault_data:/vault/data
    ports:
      - "127.0.0.1:33908:8200"
    networks:
      - backend-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Vault KV v2 initialization — seeds secrets for development
  vault-init:
    image: hashicorp/vault:1.15.6
    container_name: loyallia-vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_TOKEN:-loyallia-vault-root-token}
      # Pass secrets from .env into the container so they can be seeded into Vault
      _SECRET_KEY: ${SECRET_KEY}
      _POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      _MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      _MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      _PASS_HMAC_SECRET: ${PASS_HMAC_SECRET}
      _GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      _GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      _PAYMENT_GATEWAY_LOGIN: ${PAYMENT_GATEWAY_LOGIN:-}
      _PAYMENT_GATEWAY_TRAN_KEY: ${PAYMENT_GATEWAY_TRAN_KEY:-}
      _PAYMENT_GATEWAY_WEBHOOK_SECRET: ${PAYMENT_GATEWAY_WEBHOOK_SECRET:-}
      _EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    entrypoint: >-
      /bin/sh -c "vault secrets enable -path=secret kv-v2 2>/dev/null || true &&
      vault kv put -mount=secret loyallia secret_key=\"$${_SECRET_KEY}\" postgres_password=\"$${_POSTGRES_PASSWORD}\" minio_access_key=\"$${_MINIO_ROOT_USER}\" minio_secret_key=\"$${_MINIO_ROOT_PASSWORD}\" pass_hmac_secret=\"$${_PASS_HMAC_SECRET}\" google_oauth_client_id=\"$${_GOOGLE_OAUTH_CLIENT_ID}\" google_oauth_client_secret=\"$${_GOOGLE_OAUTH_CLIENT_SECRET}\" payment_gateway_login=\"$${_PAYMENT_GATEWAY_LOGIN}\" payment_gateway_tran_key=\"$${_PAYMENT_GATEWAY_TRAN_KEY}\" payment_gateway_webhook_secret=\"$${_PAYMENT_GATEWAY_WEBHOOK_SECRET}\" email_host_password=\"$${_EMAIL_HOST_PASSWORD}\" &&
      echo 'Vault: all secrets seeded successfully'"
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          memory: 64M

  # ---------------------------------------------------------------------------
  # NGINX — Reverse Proxy + Security Headers
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25.4-alpine
    container_name: loyallia-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    networks:
      - frontend-net
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for port 80/443
    deploy:
      # LYL-H-INFRA-014: Rolling deployment
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: start-first

  # ---------------------------------------------------------------------------
  # PROMETHEUS — Metrics Collection       → localhost:33909          [512M]
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: loyallia-prometheus
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:33909:9090"
    networks:
      - backend-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # GRAFANA — Metrics Dashboard           → localhost:33910          [512M]
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:10.3.3
    container_name: loyallia-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
    ports:
      - "127.0.0.1:33910:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring-net
    restart: unless-stopped
    # LYL-M-INFRA-018: Container hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M

  # ---------------------------------------------------------------------------
  # LOKI — Log Aggregation              → localhost:33912            [256M]
  # LYL-H-INFRA-012: Centralized log collection and querying
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:2.9.4
    container_name: loyallia-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "127.0.0.1:33912:3100"
    networks:
      - monitoring-net
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# VOLUMES — All persistent, driver: local
# =============================================================================
volumes:
  postgres_data:
    driver: local
  postgres_replica_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  static_files:
    driver: local
  media_files:
    driver: local
  next_cache:
    driver: local
  vault_data:
    driver: local
  postgres_wal_archive:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

# =============================================================================
# NETWORKS — LYL-M-INFRA-017: Container network segmentation
# frontend-net: Nginx ↔ Web (public-facing)
# backend-net:  API ↔ Database ↔ Cache ↔ Workers (internal)
# monitoring-net: Prometheus ↔ Grafana ↔ Loki (observability)
# =============================================================================
networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  monitoring-net:
    driver: bridge
