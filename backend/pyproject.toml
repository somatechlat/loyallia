# =============================================================================
# Loyallia Backend — Tool Configuration
# =============================================================================

[tool.ruff]
target-version = "py312"
line-length = 120
src = ["."]
exclude = [
    "venv",
    ".venv",
    "migrations",
    "staticfiles",
    "__pycache__",
    ".ruff_cache",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "SIM",  # flake8-simplify
]
ignore = [
    "E402",   # module level import not at top (Django settings pattern)
    "E501",   # line too long (handled by formatter)
    "B008",   # do not perform function calls in argument defaults (Django pattern)
    "SIM108", # Use ternary operator (readability preference)
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "common", "loyallia"]
