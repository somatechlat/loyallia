# =============================================================================
# Loyallia — Nginx Server Block Configuration
# Routes: /api/* → Django API | /* → Next.js Dashboard
# =============================================================================

upstream django_api {
    server api:8000;
    keepalive 32;
}

upstream nextjs_web {
    server web:3000;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:20m rate=60r/m;
limit_req_zone $binary_remote_addr zone=enroll_limit:10m rate=30r/m;

server {
    listen 80;
    server_name localhost loyallia.com www.loyallia.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(self)" always;

    # Max upload size (for logos, images)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # -------------------------------------------------------------------------
    # Static files (Django collectstatic)
    # -------------------------------------------------------------------------
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------------------------
    # API — Django Ninja
    # Rate limited: auth endpoints more strictly
    # -------------------------------------------------------------------------
    location /api/v1/auth/login/ {
        limit_req zone=auth_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/auth/register/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # -------------------------------------------------------------------------
    # Payment Gateway Webhook — no rate limit (comes from Bendo/PlacetoPay servers)
    # -------------------------------------------------------------------------
    location /api/v1/billing/webhook/ {
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # -------------------------------------------------------------------------
    # Apple Wallet Pass files (served as application/vnd.apple.pkpass)
    # -------------------------------------------------------------------------
    location ~* \.pkpass$ {
        proxy_pass http://django_api;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Content-Type "application/vnd.apple.pkpass";
        add_header Content-Disposition "attachment";
    }

    # -------------------------------------------------------------------------
    # Customer enrollment pages — Next.js
    # -------------------------------------------------------------------------
    location /enroll/ {
        limit_req zone=enroll_limit burst=10 nodelay;
        proxy_pass http://nextjs_web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # -------------------------------------------------------------------------
    # Scanner PWA — Next.js (mobile optimized)
    # -------------------------------------------------------------------------
    location /scanner/ {
        proxy_pass http://nextjs_web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # -------------------------------------------------------------------------
    # Dashboard & all other routes — Next.js
    # -------------------------------------------------------------------------
    location / {
        proxy_pass http://nextjs_web;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # -------------------------------------------------------------------------
    # Health check (for load balancer / Docker healthcheck)
    # -------------------------------------------------------------------------
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
