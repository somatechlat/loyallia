# =============================================================================
# Loyallia — Nginx Virtual Host (Production)
# SSL termination, rate limiting, security headers, gzip compression
# Upstream: Django API (api:8000), Next.js frontend (web:3000)
# =============================================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_scanner:10m rate=60r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Upstreams
upstream api_backend {
    server api:8000;
    keepalive 32;
}

upstream web_frontend {
    server web:3000;
    keepalive 16;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name rewards.loyallia.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name rewards.loyallia.com;

    # SSL certificates (managed via certbot or manual)
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://rewards.loyallia.com;" always;

    # Connection limits
    limit_conn conn_per_ip 50;

    # Client body size (for file uploads)
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Proxy buffering
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # --- API endpoints ---
    location /api/v1/auth/login {
        limit_req zone=api_login burst=10 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/v1/scanner/ {
        limit_req zone=api_scanner burst=30 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- Django admin ---
    location /django-admin/ {
        proxy_pass http://api_backend;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # --- Static files (served directly by Nginx — zero Django load) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- Next.js frontend (all other routes) ---
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Next.js static assets ---
    location /_next/static/ {
        proxy_pass http://web_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
