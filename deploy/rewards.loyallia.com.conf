upstream django_api {
    server 127.0.0.1:33905;
    keepalive 32;
}

upstream nextjs_web {
    server 127.0.0.1:33906;
    keepalive 16;
}

# Rate limiting zones (Security Hardening)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_upload:10m rate=2r/s;

# B-005: Redirect HTTP → HTTPS
server {
    listen 80;
    server_name rewards.loyallia.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# B-005: HTTPS server with TLS
server {
    listen 443 ssl http2;
    server_name rewards.loyallia.com;

    # TLS certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/rewards.loyallia.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rewards.loyallia.com/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling — faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/rewards.loyallia.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS — 2 years, include subdomains (B-005)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Security headers (B-004)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://oauth2.googleapis.com; frame-src 'self' https://accounts.google.com;" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    # Auth endpoints — strict rate limiting (brute-force protection)
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://django_api;
    }

    # Upload endpoints — strict rate limiting
    location /api/v1/upload/ {
        limit_req zone=api_upload burst=5 nodelay;
        proxy_pass http://django_api;
    }

    # General API — moderate rate limiting
    location /api/ {
        limit_req zone=api_general burst=50 nodelay;
        proxy_pass http://django_api;
    }

    location / {
        proxy_pass http://nextjs_web;
    }
}
