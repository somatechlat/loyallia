# =============================================================================
# Prometheus Configuration — Loyallia Monitoring
# LYL-H-INFRA-013: Alerting rules for backup failures, error rates, disk space
# LYL-L-INFRA-036: Container resource monitoring
# =============================================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# LYL-H-INFRA-013: Alert rules
rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Add Alertmanager target when deployed:
          # - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'api'
    metrics_path: /api/v1/metrics/
    static_configs:
      - targets: ['api:8000']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
