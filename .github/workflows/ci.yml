# =============================================================================
# Loyallia — CI Pipeline
# Runs on every pull request to main
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Check Django configuration
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --deploy --database default 2>&1 || true

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py test --verbosity=2

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint || true

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:33905
          NEXT_PUBLIC_APP_URL: http://localhost:33906
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t loyallia-api:ci ./backend

      - name: Build frontend image
        run: docker build -t loyallia-web:ci ./frontend
