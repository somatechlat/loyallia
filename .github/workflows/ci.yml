# =============================================================================
# Loyallia — CI Pipeline
# Runs on every pull request to main
# =============================================================================

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (Django)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Check Django configuration
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check --deploy --database default 2>&1 || true

      - name: Run migrations
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py migrate --noinput

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py test --verbosity=2

      # LYL-L-INFRA-032: Test coverage upload
      - name: Run tests with coverage
        env:
          DJANGO_SETTINGS_MODULE: loyallia.settings.development
          SECRET_KEY: ci-test-secret-key-not-for-production
          POSTGRES_DB: loyallia_test
          POSTGRES_USER: loyallia
          POSTGRES_PASSWORD: test_password
          DATABASE_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          DATABASE_DIRECT_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          PGBOUNCER_URL: postgres://loyallia:test_password@localhost:5432/loyallia_test
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html -q || true

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # LYL-H-INFRA-010: SAST — Bandit security scanner
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r . \
            --exclude ./.venv,./node_modules,./migrations \
            -ll \
            -ii \
            -f json \
            -o bandit-report.json \
            || true

      - name: Bandit summary
        if: always()
        run: |
          bandit -r . \
            --exclude ./.venv,./node_modules,./migrations \
            -ll \
            -ii \
            || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          if-no-files-found: ignore

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:33905
          NEXT_PUBLIC_APP_URL: http://localhost:33906
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t loyallia-api:ci ./backend

      - name: Build frontend image
        run: docker build -t loyallia-web:ci ./frontend

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t loyallia-api:scan ./backend

      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'loyallia-api:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Build frontend image for scanning
        run: docker build -t loyallia-web:scan ./frontend

      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'loyallia-web:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Audit Node.js dependencies
        working-directory: frontend
        run: npm audit --production --audit-level=high || true

      # LYL-M-INFRA-021: SBOM generation
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: loyallia-api:scan
          format: spdx-json
          output-file: sbom-api.spdx.json

      - name: Generate SBOM (frontend)
        uses: anchore/sbom-action@v0
        with:
          image: loyallia-web:scan
          format: spdx-json
          output-file: sbom-web.spdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sboms
          path: |
            sbom-api.spdx.json
            sbom-web.spdx.json
